<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; color: #333; }
        .container { background-color: #f9f9f9; padding: 20px; border: 1px solid #ddd; border-radius: 8px; }
        .header { font-size: 24px; font-weight: bold; margin-bottom: 20px; }
        .success { color: #28a745; }
        .failure { color: #dc3545; }
        .details-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .details-table td { padding: 10px; border: 1px solid #eee; }
        .button { 
            display: inline-block; padding: 12px 20px; margin-top: 20px;
            background-color: #007bff; color: #ffffff !important; 
            text-decoration: none; border-radius: 5px; font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header ${BUILD_STATUS == 'Success' ? 'success' : 'failure'}">
            ${BUILD_STATUS == 'Success' ? 'The prank was a success! 🐼' : 'Bummer, the build crashed.'}
        </div>
        
        <p>Results of the run <b>${PROJECT_NAME}</b>:</p>
        
        <table class="details-table">
            <tr><td><b>Build Number:</b></td><td>#${BUILD_NUMBER}</td></tr>
            <tr><td><b>Status:</b></td><td>${BUILD_STATUS}</td></tr>
            <tr><td><b>Branch:</b></td><td>${ENV, var="BRANCH"}</td></tr>
            <tr><td><b>Tags:</b></td><td>${ENV, var="TAG"}</td></tr>
        </table>

        <p style="font-size: 12px; color: #999; margin-top: 30px;">
            This is an automated notification from your Jenkins.
        </p>
    </div>
</body>
</html>
